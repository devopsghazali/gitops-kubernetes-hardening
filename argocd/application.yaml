apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-kubernetes-hardening
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devopsghazali/gitops-kubernetes-hardening.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: hardening-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
