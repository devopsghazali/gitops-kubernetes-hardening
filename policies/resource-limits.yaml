apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: containers-need-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
      validate:
        message: CPU and memory requests and limits are required.
        pattern:
          spec:
            =(template):
              =(spec):
                containers:
                  - resources:
                      requests:
                        cpu: "?*"
                        memory: "?*"
                      limits:
                        cpu: "?*"
                        memory: "?*"
