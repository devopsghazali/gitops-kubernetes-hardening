apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: no-privileged-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
      validate:
        message: Privileged containers are not allowed.
        pattern:
          spec:
            =(template):
              =(spec):
                containers:
                  - securityContext:
                      =(privileged): "false"
